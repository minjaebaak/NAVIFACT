services:
  # =============================================================
  # Nginx - Reverse Proxy
  # =============================================================
  nginx:
    image: nginx:alpine
    container_name: navifact-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - web
      - api
    networks:
      - navifact-network

  # =============================================================
  # Next.js Frontend
  # =============================================================
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api.navifact.ai/api/v1
        - NEXT_PUBLIC_SITE_URL=https://navifact.ai
    container_name: navifact-web
    restart: unless-stopped
    env_file:
      - ../../.env.production
    environment:
      - NODE_ENV=production
    networks:
      - navifact-network

  # =============================================================
  # FastAPI Backend
  # =============================================================
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: navifact-api
    restart: unless-stopped
    env_file:
      - ../../.env.production
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ../../apps/web/data/seed:/web/data/seed:ro
    depends_on:
      - neo4j
    networks:
      - navifact-network

  # =============================================================
  # Neo4j Graph Database
  # =============================================================
  neo4j:
    image: neo4j:5-community
    container_name: navifact-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-navifact-prod-2026}
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=256m
      - NEO4J_dbms_security_auth__minimum__password__length=4
    volumes:
      - neo4j-data:/data
    networks:
      - navifact-network

networks:
  navifact-network:
    name: navifact-network
    driver: bridge

volumes:
  neo4j-data:
