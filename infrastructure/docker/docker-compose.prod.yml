services:
  # =============================================================
  # Nginx - Reverse Proxy + SSL Termination
  # =============================================================
  nginx:
    image: nginx:alpine
    container_name: navifact-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - navifact-network

  # =============================================================
  # Next.js Frontend
  # =============================================================
  web:
    image: ghcr.io/navifact/web:latest
    container_name: navifact-web
    restart: unless-stopped
    env_file:
      - ../../.env.production
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - navifact-network

  # =============================================================
  # FastAPI Backend
  # =============================================================
  api:
    image: ghcr.io/navifact/api:latest
    container_name: navifact-api
    restart: unless-stopped
    env_file:
      - ../../.env.production
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - navifact-network

networks:
  navifact-network:
    name: navifact-network
    driver: bridge
