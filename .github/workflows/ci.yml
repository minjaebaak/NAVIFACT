name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @navifact/web lint

      - name: Type Check
        run: pnpm --filter @navifact/web build

  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: cd apps/api && ruff check .

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, lint-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Build Frontend Image
        run: docker build -f apps/web/Dockerfile -t navifact-web:test .

      - name: Build Backend Image
        run: docker build -f apps/api/Dockerfile -t navifact-api:test ./apps/api
